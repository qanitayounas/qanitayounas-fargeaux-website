  <!-- Key insight -->
  <g transform="translate(500, 870)">
    <text x="0" y="0" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="14" fill="#ffffff" letter-spacing="0.5" font-weight="600">NOTICE HOW THE GAPS BETWEEN THE WHITE NUMBERS GET SMALLER AT HIGH SPEEDS</text>
    <text x="0" y="24" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="#ffffff" letter-spacing="0.3">Speeding from 70 → 90 mph saves under 2 minutes over 10 miles</text>
    <text x="0" y="46" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="#ffffff" letter-spacing="0.3">but massively increases your risk of a serious accident.</text>
